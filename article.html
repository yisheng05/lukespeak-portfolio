<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article | Luke Ong</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CPCNFM254Q"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-CPCNFM254Q');
    </script>
    </head>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- MathJax for LaTeX rendering -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        .article-hero {
            padding-top: 150px;
            padding-bottom: 50px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        #article-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        #article-meta {
            color: var(--text-secondary);
            font-family: var(--font-sans);
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            margin-bottom: 2rem;
        }

        .article-content {
            max-width: 760px;
            margin: 0 auto var(--spacing-xl);
            font-size: 1.15rem;
            line-height: 1.8;
            color: #d1d1e0;
        }

        /* Markdown Specific Styling */
        .article-content h2 {
            font-size: 2rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .article-content h3 {
            font-size: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 0.8rem;
            color: var(--text-primary);
        }

        .article-content p {
            margin-bottom: 1.5rem;
            color: #d1d1e0;
        }

        .article-content ul,
        .article-content ol {
            margin-bottom: 1.5rem;
            padding-left: 2rem;
        }

        .article-content li {
            margin-bottom: 0.5rem;
        }

        .article-content blockquote {
            border-left: 4px solid var(--accent-primary);
            padding-left: 1.5rem;
            margin: 2rem 0;
            font-style: italic;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem 1.5rem;
            border-radius: 0 8px 8px 0;
        }

        .article-content strong {
            color: var(--text-primary);
        }

        /* Table Styling */
        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            overflow-x: auto;
            display: block;
        }

        .article-content th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-primary);
            text-align: left;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .article-content td {
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #d1d1e0;
            vertical-align: top;
        }

        .article-content tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        .article-content tr:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .article-content a {
            color: var(--accent-primary);
            text-decoration: underline;
            text-underline-offset: 4px;
            transition: var(--transition-fast);
        }

        .article-content a:hover {
            color: var(--accent-secondary);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-primary);
            text-decoration: none;
            margin-bottom: 2rem;
            font-weight: 500;
            transition: var(--transition-fast);
        }

        .back-link:hover {
            color: var(--text-primary);
            transform: translateX(-5px);
        }
    </style>
</head>

<body class="dark-theme">
    <!-- Animated Background Elements -->
    <div class="blob blob-2" style="top: -20%; right: -10%;"></div>

    <!-- Navigation -->
    <header class="glass-header">
        <nav class="container nav-container">
            <a href="index.html" class="logo">LUKE<span>SPEAK</span></a>

            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle Navigation">
                <i class="fas fa-bars"></i>
            </button>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html#about" class="nav-link">About</a></li>
                <li><a href="index.html#experience" class="nav-link">Experience</a></li>
                <li><a href="articles.html" class="nav-link active">Articles</a></li>
                <li><a href="index.html#contact" class="btn btn-primary btn-sm">Let's Talk</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="article-hero reveal">
            <a href="articles.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Articles</a>
            <h1 id="article-title">Loading...</h1>
            <div id="article-meta">
                <span id="article-date"><i class="far fa-calendar"></i></span>
                <span id="article-read-time"><i class="far fa-clock"></i></span>
            </div>
            <div class="section-divider"></div>
        </div>

        <div id="article-content" class="article-content reveal" style="transition-delay: 0.1s">
            <!-- Content loaded via JS -->
            <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
                <i class="fas fa-circle-notch fa-spin fa-3x"
                    style="color: var(--accent-primary); margin-bottom: 1rem;"></i>
                <p>Loading the article content...</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer id="contact" class="glass-footer">
        <div class="container footer-content" style="text-align: center; display: block;">
            <h3 class="footer-logo">LUKE<span>SPEAK</span></h3>
            <p>Product strategist transforming complex organizational challenges into scalable solutions.</p>
            <div class="social-links" style="justify-content: center;">
                <a href="https://www.linkedin.com/in/lukeong7" target="_blank" class="social-icon">
                    <i class="fab fa-linkedin-in"></i>
                </a>
            </div>
            <p style="margin-top: 2rem;">&copy; <span id="currentYear"></span> Luke Ong. All rights reserved.</p>
        </div>
    </footer>

    <!-- Web App Logic -->
    <script src="js/app.js"></script>
    <script src="js/article-loader.js"></script>
    <script>
        // Initialize Single Article Load
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof ArticleLoader !== 'undefined') {
                ArticleLoader.loadSingleArticle();
            }
        });
    </script>
</body>

</html>
